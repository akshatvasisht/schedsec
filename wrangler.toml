name = "schedsec"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "KV"
id = "your-kv-namespace-id"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "schedsec-backups"

[[vectorize]]
binding = "VECTORIZE"
index_name = "schedsec-learned-rules"

[vars]
ENVIRONMENT = "production"
RUN_MODE = "standard"
CRON_PREVIEW = "30 1 * * *"
CRON_FINAL = "30 9 * * *"
CRON_STATS = "59 23 * * 0"
CRON_CLEANUP = "0 0 1 * *"
CRON_BACKUP = "0 2 * * *"
CRON_HEALTH = "0 3 * * 1"

# Cron Triggers (all times in UTC)
# Configured dynamically by `npm run onboard`
[triggers]
crons = [
  "30 1 * * *",
  "30 9 * * *",
  "59 23 * * 0",
  "0 0 1 * *",
  "0 2 * * *",
  "0 3 * * 1"
]
